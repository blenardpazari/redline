name: Deploy

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dashboard/package-lock.json

      - name: Install dashboard deps
        working-directory: apps/dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: apps/dashboard
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
        run: npm run build

      - name: Deploy dashboard (static files)
        uses: easingthemes/ssh-deploy@v6.0.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          SOURCE: apps/dashboard/dist/
          TARGET: ${{ secrets.VPS_DASHBOARD_PATH }}

      - name: Deploy API
        uses: easingthemes/ssh-deploy@v6.0.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          SOURCE: apps/api/
          TARGET: ${{ secrets.VPS_API_PATH }}
          EXCLUDE: __pycache__, *.pyc, .env, data/, ml/artifacts/

      - name: Deploy ML train script
        uses: easingthemes/ssh-deploy@v6.0.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          SOURCE: apps/ml/train.py
          TARGET: ${{ secrets.VPS_API_PATH }}/ml/

      - name: Deploy systemd service file
        uses: easingthemes/ssh-deploy@v6.0.1
        with:
          SSH_PRIVATE_KEY: ${{ secrets.VPS_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.VPS_HOST }}
          REMOTE_USER: ${{ secrets.VPS_USER }}
          SOURCE: deploy/redline-api.service
          TARGET: ${{ secrets.VPS_API_PATH }}

      - name: Install Python deps & restart service
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_API_PATH }}
            python3 -m venv .venv
            .venv/bin/pip install -r requirements.txt --quiet
            mkdir -p /home/${{ secrets.VPS_USER }}/.config/systemd/user
            cp ${{ secrets.VPS_API_PATH }}/redline-api.service /home/${{ secrets.VPS_USER }}/.config/systemd/user/redline-api.service
            systemctl --user -M ${{ secrets.VPS_USER }}@ daemon-reload
            systemctl --user -M ${{ secrets.VPS_USER }}@ enable redline-api
            systemctl --user -M ${{ secrets.VPS_USER }}@ restart redline-api
            systemctl --user -M ${{ secrets.VPS_USER }}@ is-active redline-api
